<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{COMPONENT_NAME}}</title>
    <link rel="stylesheet" href="./css/body.css">
    <link rel="stylesheet" href="./css/sidebar.css">
</head>
<body>

<aside id="sidebar">
    <div id="sidebar-header">
        <span>Tests</span>
        <span id="summary-badge"></span>
    </div>
    <div id="test-list"></div>
</aside>

<div id="resizer"></div>

<main id="main">
    <div id="root"></div>
</main>

<script type="es6" src="./scripts/resizeSidebar.js"></script>

<script>
    // --- Test list API (called by test runner) ---
    // Usage: window.Cluebee.report({ component: 'Button', name: 'has text', status: 'pass' | 'fail' | 'pending' })
    window.Cluebee = {
        _data: {},   // { [component]: [{ name, status }] }
        report({ component = 'Unknown', name, status = 'pending' }) {
            if (!this._data[component]) this._data[component] = [];
            this._data[component].push({ name, status });
            this._render();
        },
        _icon(status) {
            return status === 'pass' ? '✔' : status === 'fail' ? '✘' : '○';
        },
    };
</script>

<script>{{COMPONENT_SCRIPT}}</script>
</body>
</html>
