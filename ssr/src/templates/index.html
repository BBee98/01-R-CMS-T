<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{COMPONENT_NAME}}</title>
    <link rel="stylesheet" href="./css/body.css">
    <link rel="stylesheet" href="./css/sidebar.css">
</head>
<body>

<aside id="sidebar">
    <div id="sidebar-header">
        <span>Tests</span>
        <span id="summary-badge"></span>
    </div>
    <div id="test-list"></div>
</aside>

<div id="resizer"></div>

<main id="main">
    <div id="root"></div>
</main>

<script src="./scripts/resizeSidebar.js"></script>

<script>
    // --- Test list API (called by test runner) ---
    // Usage: window.Cluebee.report({ component: 'Button', name: 'has text', status: 'pass' | 'fail' | 'pending' })
    window.Cluebee = {
        _data: {},   // { [component]: [{ name, status }] }
        report({ component = 'Unknown', name, status = 'pending' }) {
            if (!this._data[component]) this._data[component] = [];
            this._data[component].push({ name, status });
            this._render();
        },
        _icon(status) {
            return status === 'pass' ? '✔' : status === 'fail' ? '✘' : '○';
        },
        _updateSummary() {
            const all = Object.values(this._data).flat();
            if (!all.length) return;
            const failed = all.some(t => t.status === 'fail');
            const badge = document.getElementById('summary-badge');
            badge.textContent = failed ? 'FAIL' : 'PASS';
            badge.className = failed ? 'fail' : 'pass';
            badge.style.display = 'inline-block';
        },
        _render() {
            this._updateSummary();
            const list = document.getElementById('test-list');
            list.innerHTML = Object.entries(this._data).map(([component, tests]) => `
                <div class="component-block">
                    <div class="component-name">${component}</div>
                    <table>
                        <thead>
                            <tr>
                                <th class="td-status"></th>
                                <th class="td-name">Test</th>
                                <th class="td-badge">Result</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tests.map(t => `
                            <tr>
                                <td class="td-status"><span class="icon ${t.status}">${this._icon(t.status)}</span></td>
                                <td class="td-name" title="${t.name}">${t.name}</td>
                                <td class="td-badge"><span class="badge ${t.status}">${t.status}</span></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }
    };
</script>

<script>{{COMPONENT_SCRIPT}}</script>
</body>
</html>
